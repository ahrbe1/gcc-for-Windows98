name: Publish Docker Image
on: [ push ]

permissions:
  contents: write

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  docker_build:
    name: Build Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache source code
        uses: actions/cache@v4
        with:
          path: repro/src
          key: sources-${{ hashFiles('repro/config.json', 'repro/scripts/fetch-sources.sh', 'repro/scripts/lib/common.sh', 'repro/scripts/lib/config_matrix_exports.py') }}
          restore-keys: |
            sources-

      - name: Docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build
        run: bash ./build.sh
        working-directory: repro
        env:
          BUILD_EXTRAS: ${{ startsWith(github.ref, 'refs/tags/') && '1' || '0' }}

      - name: Tag and push latest
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag gcc-win98-consumer:latest ${{ secrets.DOCKER_USERNAME }}/gcc-win98-consumer:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/gcc-win98-consumer:latest

      - name: Replace tag without `v`
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/github-script@v9
        id: version
        with:
          script: |
            return context.payload.ref.replace(/^refs\/tags\//, '').replace(/^v/, '')
          result-encoding: string

      - name: Upload release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: gcc-win98-consumer-${{ steps.version.outputs.result }}
          path: |
            repro/out/package/*.tar.*
            repro/out/package/*.zip
            repro/out/package/*.json
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            repro/out/package/*.tar.*
            repro/out/package/*.zip
            repro/out/package/*.json

      - name: Tag and push release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          docker tag gcc-win98-consumer:latest ${{ secrets.DOCKER_USERNAME }}/gcc-win98-consumer:${{ steps.version.outputs.result }}
          docker push ${{ secrets.DOCKER_USERNAME }}/gcc-win98-consumer:${{ steps.version.outputs.result }}
